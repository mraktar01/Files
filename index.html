            id="searchInput"

            autocomplete="off"

          <option value="date-asc">Oldest first</option>
          <option value="name-asc">Name A → Z</option>
          <option value="name-desc">Name Z → A</option>
        </select>
      </div>

      <!-- Meta count -->
      <div class="list-meta" id="listMeta"></div>

      <!-- File list -->
      <main id="fileList" aria-live="polite"></main>
